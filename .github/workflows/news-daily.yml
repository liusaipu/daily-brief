name: Daily News Email

on:
  schedule:
    - cron: "50 0 * * *"  # 每天 UTC 时间 00:50 (北京时间 08:50)

  workflow_dispatch:  # 手动触发（可选）
jobs:
  send-daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3  # 拉取项目代码

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run daily email script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python daily_news_email.py